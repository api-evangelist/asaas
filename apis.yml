aid: asaas
name: Asaas
description: >-
  Asaas is a Brazilian financial-services and payments platform headquartered
  in Joinville, SC. It operates as a Banco Central-authorized payment
  institution and simplified credit company (SCD), offering small and medium
  businesses a digital account ("Conta Asaas") combined with collection,
  billing, and receivables tooling. The Asaas API (v3) at api.asaas.com is a
  REST/JSON surface covering Customers, Charges (Cobranças), Subscriptions,
  Installments, Pix (including Pix Automático recurring), Boleto, Credit Card,
  Checkout sessions, Payment Links, Split Payments, Transfers, Bill Payments,
  Anticipation of Receivables, Subaccounts / White-label, Invoices (Nota
  Fiscal), Escrow, Chargeback handling, Webhooks, and supporting services like
  Serasa default reporting, cell-phone recharges, and SMS / WhatsApp / email
  notifications. A full sandbox at sandbox.asaas.com, an Atlassian-hosted
  status page, a Discord developer community, and an llms.txt-indexed
  documentation site round out the developer experience. Asaas does not
  publish a first-party SDK on a GitHub org; the ecosystem is served by
  third-party community SDKs in Node.js, PHP, Python, Go, and Ruby plus
  e-commerce plugins for WooCommerce, Magento, and Nuvemshop.
