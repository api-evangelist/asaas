apis:
  - aid: asaas:customers
    name: Asaas Customers API
    description: >-
      Create, retrieve, update, list, and delete customers ("clientes"). The
      Customer object holds personal/business identifiers (CPF/CNPJ), contact
      details, address, default notification preferences, and Serasa-reporting
      configuration; it is the parent entity for charges, subscriptions, and
      installments.
    humanURL: https://docs.asaas.com/reference/criar-novo-cliente
    baseURL: https://api.asaas.com/v3
    tags:
      - Customers
      - CRM
      - CPF
      - CNPJ
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-novo-cliente
  - aid: asaas:charges
    name: Asaas Charges (Cobranças) API
    description: >-
      Core billing endpoint for creating individual charges payable by Boleto,
      Pix, Credit Card, Debit Card, or "undefined" (let the payer choose).
      Supports capture, refund, partial refund, anticipation, fine and
      interest configuration, discount rules, due-date updates, and status
      retrieval.
    humanURL: https://docs.asaas.com/reference/criar-nova-cobranca
    baseURL: https://api.asaas.com/v3
    tags:
      - Charges
      - Billing
      - Refunds
      - Boleto
      - Pix
      - Credit Card
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-nova-cobranca
  - aid: asaas:subscriptions
    name: Asaas Subscriptions API
    description: >-
      Recurring-billing subscriptions with weekly, biweekly, monthly,
      bimonthly, quarterly, semiannual, and annual cycles. Supports
      end-date or open-ended schedules, automatic charge generation per
      cycle, value updates, billing-type changes, and pause / cancel.
    humanURL: https://docs.asaas.com/reference/criar-nova-assinatura
    baseURL: https://api.asaas.com/v3
    tags:
      - Subscriptions
      - Recurring
      - Billing Cycles
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-nova-assinatura
  - aid: asaas:installments
    name: Asaas Installments (Parcelamentos) API
    description: >-
      Generate a fixed series of installment charges from a single
      installment plan - typical for splitting a total amount across N
      monthly boletos or credit-card charges.
    humanURL: https://docs.asaas.com/reference/criar-novo-parcelamento
    baseURL: https://api.asaas.com/v3
    tags:
      - Installments
      - Parcelamento
      - Billing
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-novo-parcelamento
  - aid: asaas:pix
    name: Asaas Pix API
    description: >-
      Endpoints for Pix instant payments - static and dynamic QR codes,
      Pix keys (CPF/CNPJ/email/phone/random), QR code decoding, transfer
      via Pix, and the new Pix Automático (recurring authorized Pix
      debits, publicly released January 2026).
    humanURL: https://docs.asaas.com/reference/criar-cobranca-via-pix
    baseURL: https://api.asaas.com/v3
    tags:
      - Pix
      - QR Code
      - Instant Payments
      - Pix Automático
      - Recurring
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-cobranca-via-pix
  - aid: asaas:boleto
    name: Asaas Boleto API
    description: >-
      Issue, retrieve, and reconcile Brazilian boleto bancário (bank slip)
      charges, with configurable fines, interest, discounts, and
      due-date updates. Includes a webhook event for cancellation of
      expired slips.
    humanURL: https://docs.asaas.com/reference/criar-nova-cobranca
    baseURL: https://api.asaas.com/v3
    tags:
      - Boleto
      - Bank Slip
      - Brazil
      - Billing
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-nova-cobranca
  - aid: asaas:credit-card
    name: Asaas Credit Card API
    description: >-
      Tokenize credit cards client-side and process card charges
      server-side, including pre-authorization (capture later), capture,
      refund, and 3DS challenge handling. Supports recurring use of
      tokenized cards across subscriptions and installments.
    humanURL: https://docs.asaas.com/reference/criar-nova-cobranca
    baseURL: https://api.asaas.com/v3
    tags:
      - Credit Card
      - Tokenization
      - 3DS
      - Pre Authorization
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-nova-cobranca
  - aid: asaas:checkout
    name: Asaas Checkout API
    description: >-
      Hosted checkout sessions that bundle one or more products / charges
      into a shareable payment URL. Supports multiple billing types,
      tax-document collection, and post-payment redirection.
    humanURL: https://docs.asaas.com/reference/criar-checkout
    baseURL: https://api.asaas.com/v3
    tags:
      - Checkout
      - Hosted
      - Sessions
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-checkout
  - aid: asaas:payment-links
    name: Asaas Payment Links API
    description: >-
      Generate reusable payment links ("links de pagamento") for one-off
      or recurring collection over WhatsApp, SMS, email, or social. Each
      link can carry a fixed or buyer-defined amount.
    humanURL: https://docs.asaas.com/reference/criar-link-de-pagamento
    baseURL: https://api.asaas.com/v3
    tags:
      - Payment Links
      - Collection
      - WhatsApp
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-link-de-pagamento
  - aid: asaas:split-payments
    name: Asaas Split Payments API
    description: >-
      Configure split rules on a charge so that the net amount is
      automatically distributed across one or more wallet IDs at
      settlement time - the basis for marketplaces and platforms built
      on Asaas.
    humanURL: https://docs.asaas.com/reference/split-de-pagamentos
    baseURL: https://api.asaas.com/v3
    tags:
      - Split
      - Marketplace
      - Settlement
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/split-de-pagamentos
  - aid: asaas:transfers
    name: Asaas Transfers API
    description: >-
      Move funds out of the Asaas digital account: TED to external banks,
      Pix transfers to keys or banking details, and internal transfers
      between Asaas accounts, with optional scheduling.
    humanURL: https://docs.asaas.com/reference/criar-transferencia
    baseURL: https://api.asaas.com/v3
    tags:
      - Transfers
      - TED
      - Pix
      - Banking
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-transferencia
  - aid: asaas:bill-payments
    name: Asaas Bill Payments API
    description: >-
      Pay external bills (boletos, concessionárias, GPS, DARF) from the
      Asaas digital account, with barcode-line lookup and scheduled
      execution.
    humanURL: https://docs.asaas.com/reference/pagar-uma-conta
    baseURL: https://api.asaas.com/v3
    tags:
      - Bill Payments
      - Banking
      - Boleto
      - Tax
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/pagar-uma-conta
  - aid: asaas:anticipations
    name: Asaas Anticipations (Antecipação) API
    description: >-
      Anticipate future receivables - boleto, card, and Pix - to receive
      funds before the original settlement date in exchange for a discount
      fee. Endpoints simulate, request, and list anticipations.
    humanURL: https://docs.asaas.com/reference/listar-antecipacoes
    baseURL: https://api.asaas.com/v3
    tags:
      - Anticipation
      - Receivables
      - Credit
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/listar-antecipacoes
  - aid: asaas:subaccounts
    name: Asaas Subaccounts / White-Label API
    description: >-
      Create and manage subaccounts under a master account for white-label
      and BaaS use cases. Supports KYC document submission, activation
      links, per-subaccount API keys, and consolidated reporting.
    humanURL: https://docs.asaas.com/reference/criar-subconta
    baseURL: https://api.asaas.com/v3
    tags:
      - Subaccounts
      - White Label
      - BaaS
      - KYC
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-subconta
  - aid: asaas:invoices
    name: Asaas Invoices (Nota Fiscal) API
    description: >-
      Schedule, issue, and retrieve Brazilian electronic invoices (NFS-e)
      automatically tied to a charge or subscription, including municipal
      configuration and tax retention setup.
    humanURL: https://docs.asaas.com/reference/agendar-uma-nota-fiscal
    baseURL: https://api.asaas.com/v3
    tags:
      - Invoices
      - NFSe
      - Tax
      - Compliance
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/agendar-uma-nota-fiscal
  - aid: asaas:escrow
    name: Asaas Escrow Accounts API
    description: >-
      Hold funds in escrow ("contas de garantia") until a release condition
      is met, with API-driven release or refund. Common in marketplaces
      where buyer-protection windows are required.
    humanURL: https://docs.asaas.com/reference/criar-conta-de-caucao
    baseURL: https://api.asaas.com/v3
    tags:
      - Escrow
      - Caução
      - Marketplace
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/criar-conta-de-caucao
  - aid: asaas:chargebacks
    name: Asaas Chargebacks API
    description: >-
      Retrieve and dispute credit-card chargebacks, including evidence
      upload and status retrieval.
    humanURL: https://docs.asaas.com/reference/listar-chargebacks
    baseURL: https://api.asaas.com/v3
    tags:
      - Chargebacks
      - Disputes
      - Card
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/listar-chargebacks
  - aid: asaas:account-balance
    name: Asaas Account Balance & Statement API
    description: >-
      Retrieve the current account balance and the financial statement
      (extrato) of credits and debits for the Asaas digital account.
    humanURL: https://docs.asaas.com/reference/obter-saldo-atual-da-conta
    baseURL: https://api.asaas.com/v3
    tags:
      - Balance
      - Statement
      - Extrato
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/obter-saldo-atual-da-conta
  - aid: asaas:cell-phone-recharge
    name: Asaas Cell Phone Recharge API
    description: >-
      Top up Brazilian prepaid mobile lines by carrier and amount,
      debiting the Asaas account balance.
    humanURL: https://docs.asaas.com/reference/realizar-uma-recarga-de-celular
    baseURL: https://api.asaas.com/v3
    tags:
      - Recharge
      - Mobile
      - Prepaid
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/realizar-uma-recarga-de-celular
  - aid: asaas:webhooks
    name: Asaas Webhooks API
    description: >-
      Event-driven HTTP callbacks for payment, subscription, transfer,
      anticipation, chargeback, account, and invoice events. Webhooks
      require a token (auto-generated as of Feb 2026) and Asaas signs
      requests for receiver-side verification.
    humanURL: https://docs.asaas.com/reference/configurando-o-webhook
    baseURL: customer-configured
    tags:
      - Webhooks
      - Events
      - Notifications
    properties:
      - type: Documentation
        url: https://docs.asaas.com/reference/configurando-o-webhook
