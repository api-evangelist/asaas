  - type: Features
    data:
      - name: Digital Account
        description: >-
          Free monthly Conta Asaas with Mastercard debit card and unlimited
          internal transfers, positioned as a banking layer for SMBs.
      - name: Pix Automático
        description: >-
          Recurring authorized Pix debits for subscription-style billing in
          BRL, publicly released January 2026 alongside webhook support.
      - name: Split Payments
        description: >-
          Native marketplace splitting that distributes settled funds across
          multiple wallet IDs per charge.
      - name: Anticipation of Receivables
        description: >-
          On-demand or automatic anticipation of boleto, card, and Pix
          receivables against a discount fee.
      - name: White-Label Subaccounts
        description: >-
          Create and KYC subaccounts via API for white-label and BaaS
          platforms; each subaccount has its own API key.
      - name: Automated Dunning
        description: >-
          Built-in notification engine over SMS, email, WhatsApp, and voice
          bot to chase overdue invoices; Asaas advertises ~80% default
          reduction.
      - name: Escrow Accounts
        description: >-
          Funds-in-guarantee accounts release on API-driven conditions for
          marketplace buyer protection.
      - name: NFS-e Issuance
        description: >-
          Schedule and issue Brazilian municipal NFS-e tied to a charge or
          subscription with tax-retention configuration.
      - name: Serasa Reporting
        description: >-
          Optional default reporting and credit-score lookups via Serasa
          tied to customer records.
      - name: Sandbox
        description: >-
          Full-feature sandbox.asaas.com environment for end-to-end
          integration testing before production.
  - type: UseCases
    data:
      - name: Recurring SaaS Billing
        description: >-
          Subscriptions API plus Pix Automático, boleto, or card to bill
          Brazilian SaaS customers in BRL with automated dunning.
      - name: Marketplace Settlement
        description: >-
          Split Payments + Subaccounts + Escrow let marketplaces collect,
          hold, and disburse to sellers natively in BRL.
      - name: Service-Business Collections
        description: >-
          Service businesses (clinics, schools, gyms) automate billing,
          NFS-e issuance, and overdue-payment chasing via the Asaas dunning
          engine.
      - name: White-Label / BaaS
        description: >-
          ISVs embed Asaas under their brand using Subaccounts, KYC, and
          per-account API keys to ship a payments product without a banking
          stack.
      - name: E-commerce Checkout
        description: >-
          Checkout sessions and payment links plug into custom storefronts
          and supported plugins for one-click Pix / boleto / card.
  - type: Integrations
    data:
      - name: WooCommerce
        description: Official Asaas plugin for WordPress / WooCommerce stores.
      - name: Magento
        description: Asaas extension for Magento 2 storefronts.
      - name: Nuvemshop
        description: >-
          Native Asaas integration for Nuvemshop / Tiendanube Brazilian
          merchants.
      - name: Pluga
        description: >-
          No-code automation marketplace with Asaas triggers and actions
          for connecting to hundreds of SaaS tools.
      - name: Zapier
        description: >-
          Community Zapier integrations bridge Asaas events to thousands of
          downstream apps.
  - type: Solutions
    data:
      - name: Conta Asaas (Digital Account)
        description: >-
          Free Brazilian digital account with debit card targeted at MEIs
          and SMBs.
      - name: Cobranças (Charges)
        description: >-
          The core billing product covering boleto, Pix, and card via a
          single API and UI.
      - name: Whitelabel / BaaS
        description: >-
          Subaccount-based product for partners building branded payments
          experiences on top of Asaas.
      - name: Asaas Pay
        description: >-
          Checkout / payment-link product for accepting payments without a
          full integration.
